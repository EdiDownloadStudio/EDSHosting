<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Welcome!</title><style>:root{--colors:black,rgb(2,2,2),rgb(0,47,0),rgb(0,47,0),rgb(0,47,0),rgb(0,47,0),black,rgb(28,0,0),black,rgb(31,31,31)}body{margin:0;background:#000;height:100vh;overflow:hidden;font-family:system-ui,sans-serif}.loader{position:fixed;inset:0;font-weight:700;display:flex;justify-content:center;align-items:center;background:#000;color:#fff;font-size:2rem;animation:fadeOut 1.5s ease forwards;animation-delay:2.5s;z-index:10}#dots{display:inline-block;width:40px;text-align:left}.background{display:flex;justify-content:center;align-items:center;flex-direction:column;background:linear-gradient(345deg,var(--colors));width:100%;height:0;opacity:0;animation:heightScale 3s ease forwards;animation-delay:3s}.content{width:50vw;height:59%;align-content:center;text-align:center;border-radius:12px;background:rgb(30,29,29);color:#fff}.fileName{background:0 0;border:2px solid #fff;border-radius:12px;font-weight:700;padding:2px}button{background:rgba(0,0,0,.329);border:none;border-radius:12px;color:#fff;width:120px;height:50px}button:hover{border-radius:20px;background:#000;cursor:pointer}@keyframes fadeOut{to{opacity:0;visibility:hidden}}@keyframes heightScale{from{height:0;opacity:0}to{height:100%;opacity:1}}@media(max-width:699px){.content{width:80%;height:50%}}</style></head><body><div class="loader">Loading <span id="dots"></span></div><div class="background"><div class="content"><h1>Welcome!</h1><p>If you see this page, that means this website is ready! The server configuration for this website is done!</p><p>Want to remove this page? remove <code class="fileName">index.html</code> or <code class="fileName">index2.html</code>.</p><p>If you are a normal user, this site is under construction.</p><button onclick="refreshPage()">Refresh Page</button></div></div><script>const dots=document.getElementById("dots");let i=0;setInterval(()=>{i=(i+1)%4;dots.textContent=".".repeat(i)},400);function refreshPage(){location.reload()}</script></body></html>
